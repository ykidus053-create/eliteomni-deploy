<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EliteOmni</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
<style>
  :root {
    --bg-color: #faf9f5;
    --bg-color-side: #f0eee6;
    --text-color: #2b2b2b;
    --text-color-muted: #6b6b6b;
    --accent-color: #d97757;
    --border-color: #e5e2d8;
    --user-bubble: #f0eee6;
    --code-bg: #1e1e1e;
    --font-main: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-code: "Fira Code", "SF Mono", Monaco, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
  header { padding: 14px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); z-index: 10; }
  header h1 { font-size: 18px; font-weight: 600; }
  #status { font-size: 13px; color: var(--text-color-muted); font-weight: 500; }
  #status.active { color: var(--accent-color); }
  #chat-container { flex: 1; overflow-y: auto; padding: 32px 24px; scroll-behavior: smooth; }
  .chat-inner { max-width: 768px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
  .msg-row { display: flex; width: 100%; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.ai { justify-content: flex-start; }
  .msg { max-width: 70%; line-height: 1.65; font-size: 16px; }
  .user-msg { background: var(--user-bubble); padding: 12px 18px; border-radius: 16px; color: var(--text-color); }
  .ai-msg { padding: 0; width: 100%; max-width: 100%; }
  .ai-msg p { margin-bottom: 12px; }
  .ai-msg pre { background: var(--code-bg); color: #f1f1f1; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
  .ai-msg code { font-family: var(--font-code); font-size: 14px; }
  .ai-msg p code { background: #e8e6dc; padding: 2px 6px; border-radius: 4px; color: #c7254e; }
  .ai-msg pre code { background: transparent; padding: 0; color: inherit; }
  .ai-msg ul, .ai-msg ol { margin-left: 24px; margin-bottom: 12px; }
  #input-area { background: var(--bg-color); padding: 16px 24px 24px; border-top: 1px solid var(--border-color); }
  .input-wrapper { max-width: 768px; margin: 0 auto; display: flex; align-items: flex-end; background: #ffffff; border: 1px solid var(--border-color); border-radius: 12px; padding: 8px 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); transition: border-color 0.2s; }
  .input-wrapper:focus-within { border-color: var(--accent-color); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); }
  #user-input { flex: 1; border: none; background: transparent; color: var(--text-color); font-family: var(--font-main); font-size: 16px; padding: 8px 0; outline: none; resize: none; max-height: 200px; overflow-y: auto; line-height: 1.5; }
  #user-input::placeholder { color: #a9a9a9; }
  #send-btn { background: var(--accent-color); color: #fff; border: none; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.1s; flex-shrink: 0; margin-left: 8px; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #send-btn:not(:disabled):hover { opacity: 0.9; }
  #send-btn:not(:disabled):active { transform: scale(0.95); }
  #send-btn svg { width: 18px; height: 18px; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d4d1c4; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #c0bdae; }
</style>
</head>
<body>
  <header>
    <h1>EliteOmni</h1>
    <div id="status">Ready</div>
  </header>
  <div id="chat-container">
    <div class="chat-inner" id="chat-inner">
      <div class="msg-row ai">
        <div class="msg ai-msg">
          <p>Hello! I'm EliteOmni. How can I assist you today?</p>
        </div>
      </div>
    </div>
  </div>
  <div id="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" placeholder="Reply to EliteOmni..." rows="1" autofocus></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
  </div>
<script>
  const chatInner = document.getElementById('chat-inner');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const statusDiv = document.getElementById('status');
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
    sendBtn.disabled = userInput.value.trim() === '';
  });
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    statusDiv.innerText = 'Generating...';
    statusDiv.classList.add('active');
    const aiDiv = addMessage('', 'ai');
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text})
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullResponse = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        fullResponse += chunk;
        aiDiv.innerHTML = marked.parse(fullResponse);
        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
      }
      statusDiv.innerText = 'Ready';
      statusDiv.classList.remove('active');
    } catch (e) {
      aiDiv.innerHTML = '<p style="color: red;">Error: ' + e.message + '</p>';
      statusDiv.innerText = 'Error';
      statusDiv.classList.remove('active');
    }
  }
  function addMessage(text, role) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg ' + role + '-msg';
    msgDiv.innerHTML = role === 'user' ? text.replace(/</g, '&lt;').replace(/>/g, '&gt;') : marked.parse(text);
    row.appendChild(msgDiv);
    chatInner.appendChild(row);
    document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
    return msgDiv;
  }
</script>
</body>
</html>
